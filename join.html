<style>
  /* ── RISE native form styles ── */
  .rise-form-wrap {
    background: #000;
    border-radius: 4px;
    padding: 20px;
    max-width: 630px;
    margin: 0 auto;
    color: #fff;
  }

  .rise-form-wrap .form-group {
    margin-bottom: 16px;
  }

  .rise-form-wrap label {
    display: block;
    margin-bottom: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    color: #fff;
  }

  .rise-form-wrap input[type="text"],
  .rise-form-wrap input[type="email"] {
    width: 100%;
    padding: 10px 14px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 4px;
    color: #fff;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    box-sizing: border-box;
    transition: border-color 0.2s;
  }

  .rise-form-wrap input[type="text"]:focus,
  .rise-form-wrap input[type="email"]:focus {
    outline: none;
    border-color: #ce7028;
  }

  .rise-form-wrap input[type="text"]::placeholder,
  .rise-form-wrap input[type="email"]::placeholder {
    color: #666;
  }

  .rise-form-wrap .btn-rise {
    background-color: #ce7028;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 12px 18px;
    font-family: 'Lato', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: background-color 0.2s, transform 0.1s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .rise-form-wrap .btn-rise:hover {
    background-color: #e07e30;
  }

  .rise-form-wrap .btn-rise:active {
    transform: scale(0.98);
  }

  .rise-form-wrap .btn-rise:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  /* Success / Error messages */
  #rise-form-msg {
    display: none;
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 4px;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    text-align: center;
  }

  #rise-form-msg.success {
    background: #1a3a1a;
    border: 1px solid #2a6a2a;
    color: #6fcf6f;
  }

  #rise-form-msg.error {
    background: #3a1a1a;
    border: 1px solid #6a2a2a;
    color: #cf6f6f;
  }

  .required-star {
    color: #ce7028;
    margin-left: 3px;
  }
</style>

<script>
(function () {
  // SendGrid form config — pulled from your existing window.form object
  var SUBMIT_URL  = "https://api-1.sg-form.com/signup";
  var LIST_ID     = "88a064be-0f30-4b96-9a6e-e52fd82f8ee3";
  var USER_ID     = 41765990;
  var FORM_ID     = "2b6e62cf-79c8-11ef-8cd6-52aa82ddac22";

  var form    = document.getElementById("rise-signup-form");
  var btn     = document.getElementById("rise-submit-btn");
  var msgBox  = document.getElementById("rise-form-msg");

  function showMsg(text, type) {
    msgBox.textContent = text;
    msgBox.className   = type;   // "success" or "error"
    msgBox.style.display = "block";
  }

  function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    var firstName = document.getElementById("rise_first_name").value.trim();
    var email     = document.getElementById("rise_email").value.trim();

    // Client-side validation
    if (!firstName) {
      showMsg("Please enter your first name.", "error");
      document.getElementById("rise_first_name").focus();
      return;
    }
    if (!email || !validateEmail(email)) {
      showMsg("Please enter a valid email address.", "error");
      document.getElementById("rise_email").focus();
      return;
    }

    // Build payload matching SendGrid's expected format
    var payload = {
      list_ids: [LIST_ID],
      contacts: [{
        first_name:    firstName,
        last_name:     document.getElementById("rise_last_name").value.trim(),
        email:         email,
        address_line_1: document.getElementById("rise_location").value.trim(),
        custom_fields: {
          line: document.getElementById("rise_line").value.trim()
        }
      }]
    };

    btn.disabled    = true;
    btn.textContent = "Submitting…";
    msgBox.style.display = "none";

    fetch(SUBMIT_URL, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify(payload)
    })
    .then(function (res) {
      if (res.ok || res.status === 202) {
        showMsg("Thanks for signing up!", "success");
        form.reset();
      } else {
        return res.text().then(function (body) {
          throw new Error("Server responded with " + res.status + ": " + body);
        });
      }
    })
    .catch(function (err) {
      console.error("Rise signup error:", err);
      showMsg(
        "Something went wrong — please try again or email us directly.",
        "error"
      );
    })
    .finally(function () {
      btn.disabled    = false;
      btn.textContent = "Submit";
    });
  });
})();
</script>
